<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Knowledge Graph</title>
<script src="https://cdn.jsdelivr.net/npm/force-graph@1.43.5/dist/force-graph.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e0e0e8;font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{padding:10px 16px;background:#12121c;border-bottom:1px solid #222236;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
header h1{font-size:15px;font-weight:600;color:#8888aa;white-space:nowrap}
#stats{font-size:11px;color:#666680}
#stats span{color:#9999bb;font-weight:500}
#main{flex:1;overflow:hidden;position:relative}
#empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333355;font-size:13px;text-align:center;pointer-events:none;z-index:1}
#empty strong{color:#444466;display:block;font-size:14px;margin-bottom:4px}
#legend{position:absolute;top:10px;right:10px;background:rgba(18,18,28,0.92);border:1px solid #222236;border-radius:8px;padding:10px 12px;max-height:300px;overflow-y:auto;min-width:120px;z-index:10}
#legend h4{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#555570;margin-bottom:6px}
.lrow{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px;color:#8888aa}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
</style>
</head><body>
<header>
  <h1>Skills Graph</h1>
  <div id="stats">Loading...</div>
</header>
<div id="main">
  <div id="empty"><strong>Skills Knowledge Graph</strong>
    Click a node to inspect details<br>Drag to pan · Scroll to zoom
  </div>
  <div id="legend"><h4>Namespaces</h4><div id="litems"></div></div>
</div>
<script>
fetch('graph_data.json').then(r=>r.json()).then(d=>{
  const links = d.edges.map(e=>({source:e.src,target:e.tgt}));
  document.getElementById('stats').innerHTML = '<span>'+d.nodes.length+'</span> nodes · <span>'+d.edges.length+'</span> edges';
  
  // Build legend
  const li = document.getElementById('litems');
  d.namespace_order.forEach(ns => {
    const c = d.ns_colors[ns];
    if(!c) return;
    const r = document.createElement('div');
    r.className = 'lrow';
    r.innerHTML = '<div class="dot" style="background:#'+c.toString(16).padStart(6,'0')+'"></div>'+ns;
    li.appendChild(r);
  });
  
  const g = ForceGraph()(document.getElementById('main'))
    .graphData({nodes:d.nodes,links})
    .nodeId('id')
    .nodeVal(8)
    .nodeColor(n => '#'+n.color.toString(16).padStart(6,'0'))
    .linkColor(()=>'#2a2a3a')
    .backgroundColor('#0d0d14')
    .onEngineStop(() => g.zoomToFit(400,80));
})
.catch(e => { document.getElementById('stats').textContent = 'Error: '+e.message; });
</script></body></html>
