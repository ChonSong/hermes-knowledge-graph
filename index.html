<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Knowledge Graph</title>
<script src="https://cdn.jsdelivr.net/npm/force-graph@1.43.5/dist/force-graph.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d14;
    color: #e0e0e8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    padding: 10px 20px;
    background: #12121c;
    border-bottom: 1px solid #222236;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #8888aa;
    white-space: nowrap;
  }

  #graph-stats {
    font-size: 11px;
    color: #666680;
  }
  #graph-stats span { color: #9999bb; font-weight: 500; }

  #filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    color: #555570;
    margin-right: 4px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid #2a2a3a;
    background: #1a1a28;
    color: #7777aa;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn .count {
    background: #2a2a3a;
    padding: 0 5px;
    border-radius: 8px;
    font-size: 10px;
    color: #555580;
  }
  .filter-btn.on {
    background: #1e1e30;
    color: #aaaacc;
    border-color: #3a3a55;
  }
  .filter-btn.on .count { background: #333355; color: #8888bb; }
  .filter-btn:hover { background: #222236; }

  #main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #graph-info {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 11px;
    color: #444460;
    pointer-events: none;
  }

  #legend {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(18,18,28,0.92);
    border: 1px solid #222236;
    border-radius: 8px;
    padding: 10px 12px;
    max-height: 300px;
    overflow-y: auto;
    min-width: 130px;
  }
  #legend h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555570;
    margin-bottom: 8px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
    font-size: 11px;
    color: #8888aa;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #tooltip {
    position: absolute;
    background: #1a1a28;
    border: 1px solid #333355;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: #9999bb;
    pointer-events: none;
    display: none;
    z-index: 100;
  }

  #empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #333355;
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
  }
  #empty-state strong { color: #444466; display: block; font-size: 14px; margin-bottom: 4px; }

  /* ── Detail panel ─────────────────────────────────────────── */
  #detail-panel {
    width: 320px;
    background: #12121c;
    border-left: 1px solid #1e1e2e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  #detail-panel.visible { transform: translateX(0); }

  #detail-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid #1e1e2e;
    flex-shrink: 0;
  }
  #detail-name {
    font-size: 16px;
    font-weight: 600;
    color: #d0d0e0;
    margin-bottom: 4px;
  }
  #detail-ns {
    font-size: 11px;
    color: #555580;
  }

  #detail-badges {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
  }
  .badge-verified   { background: #162a1e; color: #4ecb71; }
  .badge-unverified { background: #222236; color: #555570; }
  .badge-complex-high   { background: #2a1520; color: #e84a5f; }
  .badge-complex-medium { background: #221a30; color: #9b7acc; }
  .badge-complex-low    { background: #162030; color: #3498db; }

  #detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  #detail-desc {
    font-size: 12px;
    color: #8888aa;
    line-height: 1.5;
    margin-bottom: 14px;
  }

  /* Meta grid */
  #detail-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .meta-item {
    background: #161622;
    border-radius: 6px;
    padding: 8px 6px;
    text-align: center;
  }
  .meta-item .val {
    font-size: 16px;
    font-weight: 600;
    color: #c0c0d8;
  }
  .meta-item .lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #444466;
    margin-top: 2px;
  }

  /* Quality score bar */
  .quality-bar-wrap {
    margin-bottom: 14px;
  }
  .quality-bar-wrap .lbl {
    font-size: 10px;
    color: #444466;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .quality-bar-wrap .bar {
    height: 4px;
    background: #1e1e2e;
    border-radius: 2px;
    overflow: hidden;
  }
  .quality-bar-wrap .fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #3498db, #9b59b6, #e84a5f);
    transition: width 0.4s;
  }

  /* Section headers */
  .sec-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #444466;
    margin-bottom: 8px;
  }
  .copy-btn {
    background: #1e1e2e;
    border: 1px solid #2a2a3a;
    color: #666680;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: #2a2a3a; color: #9999bb; border-color: #3a3a55; }
  .copy-btn.copied { color: #4ecb71; border-color: #2a4a3a; }

  .detail-section {
    margin-bottom: 14px;
  }

  /* Qualified name */
  #detail-qualified {
    background: #161622;
    border: 1px solid #222236;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 12px;
    color: #8888cc;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 14px;
  }
  #detail-qualified .qname-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #detail-qualified .copy-icon {
    flex-shrink: 0;
    cursor: pointer;
    color: #555580;
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  #detail-qualified .copy-icon:hover { background: #2a2a3a; color: #9999bb; border-color: #3a3a55; }
  #detail-qualified .copy-icon.copied { color: #4ecb71; }

  /* Tools */
  #detail-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .tool-chip {
    background: #1a2530;
    color: #5a9ab8;
    border: 1px solid #2a3a4a;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
  }

  /* Tags */
  #detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .tag-chip {
    background: #2a1a30;
    color: #b87acc;
    border: 1px solid #3a2a4a;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
  }

  /* Role/author/version */
  .meta-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }
  .meta-card {
    background: #161622;
    border-radius: 6px;
    padding: 8px 10px;
  }
  .meta-card .card-lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #444466;
    margin-bottom: 3px;
  }
  .meta-card .card-val {
    font-size: 11px;
    color: #8888aa;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Connections */
  #conn-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .conn-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .conn-item:hover { background: #1a1a28; }
  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .conn-name { font-size: 11px; color: #8888aa; flex: 1; }
  .conn-type {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .conn-type.member-of { background: #1a1a30; color: #6666aa; }
  .conn-type.workflow-peer { background: #1a2a1a; color: #5a8a5a; }
  .conn-type.quality-hub { background: #2a1a2a; color: #8a5aaa; }
  .conn-type.tool-use { background: #1a2a2a; color: #4a8a8a; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>Skills Graph</h1>
  <div id="graph-stats">—</div>
  <div id="filter-bar">
    <span class="filter-label">Edges:</span>
  </div>
</header>

<div id="main-layout">
  <div id="graph-container">
    <div id="graph-info"></div>
    <div id="legend">
      <h4>Namespaces</h4>
      <div id="legend-item"></div>
    </div>
    <div id="tooltip"></div>
    <div id="empty-state">
      <strong>Skills Knowledge Graph</strong>
      Click a node to inspect details<br>
      Drag to pan · Scroll to zoom
    </div>
  </div>
  <div id="detail-panel">
    <div id="detail-header">
      <div id="detail-name">—</div>
      <div id="detail-ns">—</div>
      <div id="detail-badges"></div>
    </div>
    <div id="detail-body">
      <div id="detail-qualified">
        <span class="qname-text" id="detail-qname">—</span>
        <span class="copy-icon" id="copy-qname" title="Copy qualified name">⎘</span>
      </div>
      <div id="detail-desc"></div>

      <div class="quality-bar-wrap">
        <div class="lbl">
          <span>Quality Score</span>
          <span id="quality-val">—</span>
        </div>
        <div class="bar"><div class="fill" id="quality-fill"></div></div>
      </div>

      <div id="detail-meta"></div>

      <div class="meta-row">
        <div class="meta-card">
          <div class="card-lbl">Author</div>
          <div class="card-val" id="detail-author">—</div>
        </div>
        <div class="meta-card">
          <div class="card-lbl">Version</div>
          <div class="card-val" id="detail-version">—</div>
        </div>
      </div>

      <div class="detail-section" id="detail-tools-section" style="display:none">
        <div class="sec-header">
          <span>Tools Used</span>
        </div>
        <div id="detail-tools"></div>
      </div>

      <div class="detail-section" id="detail-tags-section" style="display:none">
        <div class="sec-header">
          <span>Tags</span>
        </div>
        <div id="detail-tags"></div>
      </div>

      <div class="detail-section">
        <div class="sec-header">
          <span>Connections</span>
          <span id="conn-count" style="color:#444466;font-size:9px"></span>
        </div>
        <div id="conn-list"></div>
      </div>
    </div>
  </div>
</div>

 "openhue", "tgt": "touchdesigner-mcp", "type": "workflow-peer", "label": "controller"}, {"src": "findmy", "tgt": "touchdesigner-mcp", "type": "workflow-peer", "label": "controller"}, {"src": "youtube-content", "tgt": "xurl", "type": "workflow-peer", "label": "poster"}, {"src": "youtube-content", "tgt": "himalaya", "type": "workflow-peer", "label": "worker"}, {"src": "arxiv", "tgt": "polymarket", "type": "workflow-peer", "label": "worker"}, {"src": "polymarket", "tgt": "research-paper-writing", "type": "workflow-peer", "label": "worker"}, {"src": "llm-wiki", "tgt": "arxiv", "type": "quality-hub", "label": ""}, {"src": "llm-wiki", "tgt": "comfyui", "type": "quality-hub", "label": ""}, {"src": "llm-wiki", "tgt": "claude-design", "type": "quality-hub", "label": ""}, {"src": "llm-wiki", "tgt": "manim-video", "type": "quality-hub", "label": ""}, {"src": "llm-wiki", "tgt": "baoyu-comic", "type": "quality-hub", "label": ""}, {"src": "llm-wiki", "tgt": "baoyu-infographic", "type": "quality-hub", "label": ""}, {"src": "arxiv", "tgt": "comfyui", "type": "quality-hub", "label": ""}, {"src": "arxiv", "tgt": "claude-design", "type": "quality-hub", "label": ""}, {"src": "arxiv", "tgt": "manim-video", "type": "quality-hub", "label": ""}, {"src": "arxiv", "tgt": "baoyu-comic", "type": "quality-hub", "label": ""}, {"src": "arxiv", "tgt": "baoyu-infographic", "type": "quality-hub", "label": ""}, {"src": "comfyui", "tgt": "claude-design", "type": "quality-hub", "label": ""}, {"src": "comfyui", "tgt": "manim-video", "type": "quality-hub", "label": ""}, {"src": "comfyui", "tgt": "baoyu-comic", "type": "quality-hub", "label": ""}, {"src": "comfyui", "tgt": "baoyu-infographic", "type": "quality-hub", "label": ""}, {"src": "claude-design", "tgt": "manim-video", "type": "quality-hub", "label": ""}, {"src": "claude-design", "tgt": "baoyu-comic", "type": "quality-hub", "label": ""}, {"src": "claude-design", "tgt": "baoyu-infographic", "type": "quality-hub", "label": ""}, {"src": "manim-video", "tgt": "baoyu-comic", "type": "quality-hub", "label": ""}, {"src": "manim-video", "tgt": "baoyu-infographic", "type": "quality-hub", "label": ""}, {"src": "baoyu-comic", "tgt": "baoyu-infographic", "type": "quality-hub", "label": ""}, {"src": "llm-wiki", "tgt": "blogwatcher", "type": "quality-hub", "label": ""}, {"src": "arxiv", "tgt": "blogwatcher", "type": "quality-hub", "label": ""}], "ns_colors": {"research": 686476, "creative": 916074, "autonomous-ai-agents": 16524132, "smart-home": 9230731, "media": 16731947, "mcp": 4616095, "apple": 6676094, "software-development": 3033788, "red-teaming": 2899960, "data-science": 5065727, "productivity": 3009120, "note-taking": 4813496, "social-media": 5741276, "github": 3914349, "email": 4935828, "gaming": 1182677, "devops": 4897155, "other": 9568766}, "edge_types": [["member-of", "Same namespace", 916074, 0.4], ["workflow-peer", "Same role", 3914349, 1.0], ["quality-hub", "Quality hub", 6296038, 1.2], ["tool-use", "Shared tools", 0x2ecc71, 0.6]], "edge_filter_default": {"member-of": false, "workflow-peer": true, "quality-hub": true, "tool-use": false}, "namespace_order": ["research", "creative", "autonomous-ai-agents", "smart-home", "media", "mcp", "apple", "software-development", "red-teaming", "data-science", "productivity", "note-taking", "social-media", "github", "email", "gaming", "devops", "other"]};

const { nodes, edges, ns_colors, edge_types, edge_filter_default, namespace_order } = GRAPH_DATA;

// ─── Filter state ──────────────────────────────────────────────────────
const activeTypes = new Set(Object.keys(edge_filter_default).filter(k => edge_filter_default[k]));

// ─── Build legend ──────────────────────────────────────────────────────
const legendItem = document.getElementById('legend-item');
namespace_order.forEach(ns => {
  const c = ns_colors[ns];
  if (!c) return;
  const row = document.createElement('div');
  row.className = 'legend-row';
  row.innerHTML = `<div class="dot" style="background:#${c.toString(16).padStart(6,'0')}"></div><span>${ns}</span>`;
  legendItem.appendChild(row);
});

// ─── Build edge filter buttons ──────────────────────────────────────────
const filterBar = document.getElementById('filter-bar');
edge_types.forEach(([type, label, color]) => {
  const count = edges.filter(e => e.type === type).length;
  if (count === 0) return;
  const btn = document.createElement('button');
  const isOn = edge_filter_default[type];
  btn.className = 'filter-btn' + (isOn ? ' on' : '');
  btn.dataset.type = type;
  btn.innerHTML = `<span class="dot" style="background:#${color.toString(16).padStart(6,'0')}"></span>${label}<span class="count">${count}</span>`;
  btn.addEventListener('click', () => {
    if (activeTypes.has(type)) {
      activeTypes.delete(type);
      btn.classList.remove('on');
    } else {
      activeTypes.add(type);
      btn.classList.add('on');
    }
    rebuildGraph();
  });
  filterBar.appendChild(btn);
});

// ─── Stats ──────────────────────────────────────────────────────────────
const stats = document.getElementById('graph-stats');
stats.innerHTML = `<span>${nodes.length}</span> nodes · <span>${edges.length}</span> edges · click node for details`;

let graph = null;

function filteredEdges() {
  return edges.filter(e => activeTypes.has(e.type));
}

function rebuildGraph() {
  const fEdges = filteredEdges();

  const gEdges = fEdges.map(e => ({
    source: e.src,
    target: e.tgt,
    color: edgeColorFor(e.type),
    width: edgeWidthFor(e.type),
  }));

  if (graph) {
    graph.graphData({ nodes, links: gEdges });
    return;
  }

  const container = document.getElementById('graph-container');
  graph = ForceGraph()(container)
    .graphData({ nodes, links: gEdges })
    .nodeId('id')
    .nodeLabel(n => `${n.name} (${n.namespace})`)
    .nodeVal('size')
    .nodeColor(n => `#${n.color.toString(16).padStart(6,'0')}`)
    .linkColor(() => '#2a2a3a')
    .linkWidth(1.5)
    .linkDirectionalParticles(0)
    .backgroundColor('#0d0d14')
    .onNodeClick(showDetail)
    .onBackgroundClick(() => hideDetail())
    .nodeCanvasObjectMode(() => 'after')
    .nodeCanvasObject((node, ctx) => {
      if (node.verified) {
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.size + 2.5, 0, 2 * Math.PI);
        ctx.strokeStyle = '#4ecb71';
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
    });

  graph.zoomToFit(400, 60);
}

function edgeColorFor(type) {
  const f = edge_types.find(e => e[0] === type);
  return f ? `#${f[2].toString(16).padStart(6,'0')}` : '#333';
}

function edgeWidthFor(type) {
  const f = edge_types.find(e => e[0] === type);
  return f ? f[3] : 1;
}

// ─── Detail panel ───────────────────────────────────────────────────────
const panel = document.getElementById('detail-panel');
const emptyState = document.getElementById('empty-state');

function showDetail(node) {
  emptyState.style.display = 'none';
  panel.classList.add('visible');

  document.getElementById('detail-name').textContent = node.name;
  document.getElementById('detail-ns').textContent = node.namespace + ' / ' + node.role;

  // Qualified name + copy button
  document.getElementById('detail-qname').textContent = node.qualified_name;
  const copyIcon = document.getElementById('copy-qname');
  copyIcon.textContent = '⎘';
  copyIcon.classList.remove('copied');
  copyIcon.onclick = () => {
    navigator.clipboard.writeText(node.qualified_name).then(() => {
      copyIcon.textContent = '✓';
      copyIcon.classList.add('copied');
      setTimeout(() => {
        copyIcon.textContent = '⎘';
        copyIcon.classList.remove('copied');
      }, 1500);
    });
  };

  // Badges
  const badges = document.getElementById('detail-badges');
  badges.innerHTML = '';
  const badgeVer = document.createElement('span');
  badgeVer.className = 'badge ' + (node.verified ? 'badge-verified' : 'badge-unverified');
  badgeVer.textContent = node.verified ? '✓ verified' : 'unverified';
  badges.appendChild(badgeVer);

  const badgeCpx = document.createElement('span');
  badgeCpx.className = 'badge badge-complex-' + node.complexity;
  badgeCpx.textContent = node.complexity + ' complexity';
  badges.appendChild(badgeCpx);

  // Quality bar
  const qPct = Math.min(100, (node.quality / 10) * 100);
  document.getElementById('quality-val').textContent = node.quality.toFixed(1);
  document.getElementById('quality-fill').style.width = qPct + '%';

  // Meta grid
  const meta = document.getElementById('detail-meta');
  meta.innerHTML = '';
  [{ val: node.steps, lbl: 'Steps' }, { val: node.examples, lbl: 'Examples' }, { val: node.pitfalls, lbl: 'Pitfalls' }, { val: node.lines, lbl: 'Lines' }].forEach(m => {
    const item = document.createElement('div');
    item.className = 'meta-item';
    item.innerHTML = `<div class="val">${m.val}</div><div class="lbl">${m.lbl}</div>`;
    meta.appendChild(item);
  });

  // Author / version
  document.getElementById('detail-author').textContent = node.author || '—';
  document.getElementById('detail-version').textContent = node.version || '—';

  // Tools
  const toolsSec = document.getElementById('detail-tools-section');
  const toolsDiv = document.getElementById('detail-tools');
  toolsDiv.innerHTML = '';
  if (node.tools && node.tools.length > 0) {
    toolsSec.style.display = 'flex';
    node.tools.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'tool-chip';
      chip.textContent = t;
      toolsDiv.appendChild(chip);
    });
  } else {
    toolsSec.style.display = 'none';
  }

  // Tags
  const tagsSec = document.getElementById('detail-tags-section');
  const tagsDiv = document.getElementById('detail-tags');
  tagsDiv.innerHTML = '';
  if (node.tags && node.tags.length > 0) {
    tagsSec.style.display = 'flex';
    node.tags.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.textContent = t;
      tagsDiv.appendChild(chip);
    });
  } else {
    tagsSec.style.display = 'none';
  }

  // Description
  document.getElementById('detail-desc').textContent = node.desc;

  // Connections
  const fEdges = filteredEdges();
  const connList = document.getElementById('conn-list');
  connList.innerHTML = '';
  const conns = fEdges.filter(e => e.src === node.id || e.tgt === node.id);
  document.getElementById('conn-count').textContent = conns.length + ' connections';

  conns.forEach(e => {
    const otherId = e.src === node.id ? e.tgt : e.src;
    const other = nodes.find(n => n.id === otherId);
    if (!other) return;
    const item = document.createElement('div');
    item.className = 'conn-item';
    const typeClass = e.type.replace(/\s+/g, '-').toLowerCase();
    item.innerHTML = `<div class="conn-dot" style="background:#${other.color.toString(16).padStart(6,'0')}"></div><span class="conn-name">${other.name}</span><span class="conn-type ${typeClass}">${e.label || e.type}</span>`;
    item.addEventListener('click', () => showDetail(other));
    connList.appendChild(item);
  });
}

function hideDetail() {
  panel.classList.remove('visible');
  emptyState.style.display = '';
}

// ─── Init ───────────────────────────────────────────────────────────────
rebuildGraph();
</script>
