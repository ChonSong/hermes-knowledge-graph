<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Graph</title>
<script src="https://cdn.jsdelivr.net/npm/force-graph@1.43.5/dist/force-graph.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e0e0e8;font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{padding:8px 14px;background:#12121c;border-bottom:1px solid #222236;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;font-size:11px}
header h1{font-size:14px;font-weight:600;color:#8888aa;white-space:nowrap}
#stats{font-size:11px;color:#666680}
#stats span{color:#9999bb;font-weight:500}
.hctrl{display:flex;align-items:center;gap:3px;color:#555570}
.hctrl select{background:#161622;border:1px solid #2a2a3a;border-radius:5px;padding:1px 5px;color:#aaaacc;font-size:10px;outline:none;cursor:pointer}
.hctrl input[type=range]{width:45px;height:10px;cursor:pointer;accent-color:#5a5a8a}
.hctrl .rv{min-width:18px;text-align:right;color:#8888aa;font-size:10px}
#fb{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.fbtn{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;border:1px solid #2a2a3a;background:#1a1a28;color:#7777aa;font-size:10px;cursor:pointer;transition:all .12s}
.fbtn.on{background:#1e1e30;color:#aaaacc;border-color:#3a3a55}
.fbtn .dot{width:6px;height:6px;border-radius:50%}
.fbtn .ct{background:#2a2a3a;padding:0 5px;border-radius:6px;font-size:9px;color:#555580}
.fbtn.on .ct{background:#333355;color:#8888bb}
#si{background:#161622;border:1px solid #2a2a3a;border-radius:6px;padding:2px 8px;color:#aaaacc;font-size:10px;outline:none;width:110px}
#si:focus{border-color:#4a4a6a}#si::placeholder{color:#444460}
#main{flex:1;overflow:hidden;position:relative}
#empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#333355;font-size:12px;text-align:center;pointer-events:none;z-index:1;line-height:1.6}
#empty strong{color:#444466;display:block;font-size:13px}
#legend{position:absolute;top:8px;right:8px;background:rgba(18,18,28,0.92);border:1px solid #222236;border-radius:7px;padding:8px 10px;z-index:10;max-height:260px;overflow-y:auto;min-width:100px}
#legend h4{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#555570;margin-bottom:5px}
.lrow{display:flex;align-items:center;gap:5px;margin-bottom:2px;font-size:10px;color:#8888aa;cursor:pointer;opacity:.5;transition:opacity .12s}
.lrow.on{opacity:1}.lrow:hover{opacity:.8}
.lrow .nl{color:#555570;transition:color .12s}
.lrow.on .nl{color:#9999bb}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#detail{position:fixed;top:0;right:0;width:300px;height:100%;background:#12121c;border-left:1px solid #1e1e2e;transform:translateX(100%);transition:transform .2s;z-index:100;overflow-y:auto;padding:16px;font-size:11px;color:#8888aa}
#detail.v{transform:translateX(0)}
#detail h2{font-size:14px;font-weight:600;color:#d0d0e0;margin-bottom:4px}
#detail .ns{font-size:10px;color:#555580;margin-bottom:8px}
#detail .d{line-height:1.4;margin-bottom:10px}
#detail .g{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
#detail .g .v{font-size:14px;font-weight:600;color:#c0c0d8}
#detail .g .l{font-size:9px;color:#444466;text-transform:uppercase}
#detail .c{flex:1;background:#161622;border-radius:5px;padding:6px 8px}
#detail .c .t{font-size:8px;color:#444466;text-transform:uppercase}
#detail .c .v{font-size:10px;color:#8888aa}
</style>
</head><body>
<header>
<h1>Skills Graph</h1><div id="stats">Loading…</div>
<div class="hctrl"><span>Size:</span><select id="sz"><option value="quality">Quality</option><option value="steps">Steps</option><option value="examples">Examples</option><option value="lines">Lines</option><option value="size">Raw</option></select></div>
<div class="hctrl"><span>Spread</span><input type="range" id="charge" min="10" max="300" value="60"><span class="rv" id="charge-v">60</span></div>
<div class="hctrl"><span>Link</span><input type="range" id="linkd" min="5" max="100" value="20"><span class="rv" id="linkd-v">20</span></div>
<div id="fb"></div>
<input type="text" id="si" placeholder="Search…" autocomplete="off">
</header>
<div id="main">
<div id="empty"><strong>Skills Knowledge Graph</strong><br>Click a node for details<br>Drag to pan · Scroll to zoom</div>
<div id="legend"><h4>Namespaces</h4><div id="lit"></div></div>
<div id="detail"></div>
</div>
<script>
fetch('graph_data.json').then(r=>r.json()).then(D=>{
const N=D.nodes,E=D.edges,NC=D.ns_colors,ET=D.edge_types,EFD=D.edge_filter_default,NO=D.namespace_order;
const activeTypes=new Set(Object.keys(EFD).filter(k=>EFD[k]));
const activeNS=new Set(NO.filter(n=>NC[n]));
let chargeV=60,linkDV=20,sizeField='size',graph=null,initDone=false;
const SZR={quality:[0,10],steps:[0,30],examples:[0,20],lines:[0,500],size:[0,30]};
function nodeSz(n){var r=SZR[sizeField]||[0,10];var raw=n[sizeField]||r[0];return 3+Math.max(0,Math.min(1,(raw-r[0])/(r[1]-r[0]||1)))*20;}
function eCol(t){var f=ET.find(function(e){return e[0]===t;});return f?'#'+f[2].toString(16).padStart(6,'0'):'#555';}
function eWid(t){var f=ET.find(function(e){return e[0]===t;});return f?f[3]:1;}
function rebuild(){
var vs=N.filter(function(n){return activeNS.has(n.namespace);});
var vi=new Set(vs.map(function(n){return n.id;}));
var fe=E.filter(function(e){return activeTypes.has(e.type);});
var nf=fe.filter(function(e){return vi.has(e.src)&&vi.has(e.tgt);});
var ge=nf.map(function(e){return{source:e.src,target:e.tgt,color:eCol(e.type),width:eWid(e.type)};});
if(graph){graph.graphData({nodes:vs,links:ge});graph.d3Force('charge').strength(-chargeV);graph.d3Force('link').distance(linkDV);graph.d3ReheatSimulation();updateStats();return;}
var c=document.getElementById('main');
graph=ForceGraph()(c).graphData({nodes:vs,links:ge}).nodeId('id').nodeVal(nodeSz).nodeColor(function(n){return'#'+n.color.toString(16).padStart(6,'0');}).linkColor(function(l){return l.color||'#555';}).linkWidth(function(l){return l.width||1;}).linkDirectionalParticles(0).backgroundColor('#0d0d14').d3AlphaDecay(0.02).d3VelocityDecay(0.3).warmupTicks(100).cooldownTicks(30).nodeLabel(function(n){return n.name;}).onNodeClick(function(n){showD(n);}).onBackgroundClick(function(){hideD();}).onEngineStop(function(){if(!initDone){initDone=true;graph.zoomToFit(400,60);}});
updateStats();
}
function showD(n){var p=document.getElementById('detail');p.innerHTML='<h2>'+n.name+'</h2><div class=ns>'+n.namespace+' / '+n.role+'</div><div class=d>'+(n.desc||'')+'</div><div class=g>'+[{v:n.steps,l:'Steps'},{v:n.examples,l:'Examples'},{v:n.pitfalls,l:'Pitfalls'},{v:n.lines,l:'Lines'}].map(function(m){return'<div><div class=v>'+m.v+'</div><div class=l>'+m.l+'</div></div>';}).join('')+'</div><div class=c><div class=t>Quality</div><div class=v>'+n.quality.toFixed(1)+'</div></div><div class=c><div class=t>Author</div><div class=v>'+(n.author||'—')+'</div></div>';p.classList.add('v');}
function hideD(){document.getElementById('detail').classList.remove('v');}
// Legend
var li=document.getElementById('lit');
NO.forEach(function(ns){var c=NC[ns];if(!c)return;var r=document.createElement('div');r.className='lrow on';r.innerHTML='<div class=dot style="background:#'+c.toString(16).padStart(6,'0')+'"></div><span class=nl>'+ns+'</span>';r.addEventListener('click',function(){if(activeNS.has(ns)){if(activeNS.size<=1)return;activeNS.delete(ns);r.classList.remove('on');}else{activeNS.add(ns);r.classList.add('on');}rebuild();});li.appendChild(r);});
// Filter buttons
var fb=document.getElementById('fb');
ET.forEach(function(t){var type=t[0],label=t[1],color=t[2];var count=E.filter(function(e){return e.type===type;}).length;if(count===0)return;var b=document.createElement('button');var isOn=EFD[type];b.className='fbtn'+(isOn?' on':'');b.innerHTML='<span class=dot style="background:#'+color.toString(16).padStart(6,'0')+'"></span>'+label+'<span class=ct>'+count+'</span>';b.addEventListener('click',function(){if(activeTypes.has(type)){activeTypes.delete(type);b.classList.remove('on');}else{activeTypes.add(type);b.classList.add('on');}rebuild();});fb.appendChild(b);});
function updateStats(){document.getElementById('stats').innerHTML='<span>'+N.length+'</span> nodes <span>'+E.length+'</span> edges';}
// Controls
document.getElementById('sz').addEventListener('change',function(e){sizeField=e.target.value;if(graph){graph.nodeVal(nodeSz);graph.d3ReheatSimulation();}});
document.getElementById('charge').addEventListener('input',function(e){chargeV=parseInt(e.target.value);document.getElementById('charge-v').textContent=chargeV;if(graph){graph.d3Force('charge').strength(-chargeV);graph.d3ReheatSimulation();}});
document.getElementById('linkd').addEventListener('input',function(e){linkDV=parseInt(e.target.value);document.getElementById('linkd-v').textContent=linkDV;if(graph){graph.d3Force('link').distance(linkDV);graph.d3ReheatSimulation();}});
// Search
document.getElementById('si').addEventListener('input',function(e){var q=e.target.value.toLowerCase().trim();if(!q){if(graph)graph.nodeColor(function(n){return'#'+n.color.toString(16).padStart(6,'0');}).nodeLabel(function(n){return n.name;});return;}if(graph)graph.nodeColor(function(n){return n.name.toLowerCase().includes(q)||n.namespace.toLowerCase().includes(q)?'#'+n.color.toString(16).padStart(6,'0'):'#222236';}).nodeLabel(function(n){return n.name.toLowerCase().includes(q)||n.namespace.toLowerCase().includes(q)?n.name:'';});});
rebuild();
}).catch(function(e){document.getElementById('stats').textContent='Error: '+e.message;});
</script>
</body></html>
