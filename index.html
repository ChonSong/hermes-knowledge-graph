    #graph { width: 100vw; height: 100vh; }
    #info {
      position: fixed; top: 20px; left: 20px; background: rgba(20,20,20,0.95);
      border: 1px solid #333; border-radius: 8px; padding: 16px; max-width: 320px;
      font-size: 13px; line-height: 1.5; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #info h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    #info .legend { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
    #info .legend-item { display: flex; align-items: center; gap: 8px; }
    #info .dot { width: 10px; height: 10px; border-radius: 50%; }
    #info .desc { color: #888; font-size: 11px; margin-top: 8px; }
    #info code { background: #222; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: #7eb8da; }
    #info pre { background: #1a1a1a; padding: 10px; border-radius: 6px; margin-top: 8px; font-size: 11px; overflow-x: auto; }
    .link-type-toggle {
      position: fixed; bottom: 20px; left: 20px; background: rgba(20,20,20,0.95);
      border: 1px solid #333; border-radius: 8px; padding: 12px; z-index: 100;
      display: flex; gap: 8px; flex-wrap: wrap; max-width: 90vw;
    }
    .toggle-btn {
      background: #222; border: 1px solid #444; color: #888; padding: 6px 12px;
      border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s;
    }
    .toggle-btn:hover { border-color: #666; color: #aaa; }
    .toggle-btn.active { background: #306090; border-color: #5090c0; color: #fff; }
  </style>
</head>

  { id: 'config:plans', label: 'plans/', type: 'config', desc: '~/.hermes/plans/ — implementation plans' }
];
configNodes.forEach(c => {
  nodes.push({
    id: c.id,
    label: c.label,
    type: c.type,
    category: 'config',
    color: COLOR_HEX.config,
    size: 8,
    desc: c.desc
  });
});

// Projects
const projectNodes = [
  { id: 'proj:hermes-agent', label: 'hermes-agent', desc: 'ChonSong/hermes-agent (fork) — main agent repo' },
  { id: 'proj:hermes-web-computer', label: 'HWC', desc: 'Go + Svelte5. v1.3 Phase Engine complete.' },
  { id: 'proj:agent-os', label: 'agent-os', desc: 'Legacy: Node/Express+React+Postgres. React 19 upgraded.' },
  { id: 'proj:repo-transmute', label: 'repo-transmute', desc: 'ChonSong/repo-transmute — vision-driven migration' },
  { id: 'proj:seans-reporepo', label: 'seans-reporepo', desc: 'ChonSong/seans-reporepo — cron Mon 9am' },
  { id: 'proj:hermes-sync', label: 'hermes-sync', desc: 'ChonSong/hermes-sync — backup repo' }
];
projectNodes.forEach(p => {
  nodes.push({
    id: p.id,
    label: p.label,
    type: 'project',
    category: 'project',
    color: COLOR_HEX.project,
    size: 10,
    desc: p.desc
  });
});

// Link projects to related items
links.push({ source: 'proj:hermes-agent', target: 'skill:autonomous-ai-agents/hermes-agent', color: 0x5b8fd9, width: 1 });
links.push({ source: 'proj:hermes-web-computer', target: 'skill:software-development/svelte-development', color: 0x5b8fd9, width: 1 });
links.push({ source: 'proj:agent-os', target: 'skill:devops/agent-os-architecture', color: 0x5b8fd9, width: 1 });
links.push({ source: 'proj:repo-transmute', target: 'skill:repo-transmute/repo-transmute', color: 0x5b8fd9, width: 1 });

// Cross-links between related skills
const crossLinks = [
  ['skill:mlops/inference/llama-cpp', 'skill:mlops/inference/vllm'],
  ['skill:mlops/training/axolotl', 'skill:mlops/training/unsloth'],
  ['skill:software-development/subagent-driven-development', 'skill:software-development/plan'],
  ['skill:github/github-pr-workflow', 'skill:github/github-code-review'],
  ['skill:devops/docker-patterns', 'skill:hermes/hermes-docker-workflow'],
  ['skill:autonomous-ai-agents/hermes-agent', 'skill:software-development/hermes-agent-skill-authoring'],
  ['skill:research/arxiv', 'skill:research/research-paper-writing'],
  ['skill:productivity/notion', 'skill:note-taking/obsidian'],
  ['skill:media/spotify', 'skill:media/heartmula'],
  ['skill:devops/kanban-orchestrator', 'skill:devops/kanban-worker'],
  ['skill:mlops/research/dspy', 'skill:mlops/inference/outlines'],
  ['skill:software-development/test-driven-development', 'skill:software-development/e2e-testing'],
  ['skill:autonomous-ai-agents/claude-code', 'skill:autonomous-ai-agents/opencode'],
  ['skill:github/github-auth', 'skill:github/github-repo-management'],
  ['skill:devops/infrastructure-as-code', 'skill:devops/deployment-patterns'],
  ['skill:productivity/google-workspace', 'skill:email/himalaya'],
  ['skill:mlops/inference/llama-cpp', 'skill:mlops/huggingface-hub'],
  ['skill:software-development/python-debugpy', 'skill:software-development/systematic-debugging'],
  ['skill:creative/excalidraw', 'skill:creative/architecture-diagram'],
  ['skill:media/youtube-content', 'skill:research/blogwatcher']
];
crossLinks.forEach(([src, tgt]) => {
  if (nodeMap.has(src) && nodeMap.has(tgt)) {
    links.push({ source: src, target: tgt, color: 0x3a5a3a, width: 0.7 });
  }
});

// Graph data
const data = { nodes, links };

// Legend
const legend = document.getElementById('legend');
const types = [
  { type: 'agent', color: '#c07bd4', label: 'Core Agent' },
  { type: 'category', color: '#888', label: 'Skill Category (cluster)' },
  { type: 'skill', color: '#5b8fd9', label: 'Skill (89 total)' },
  { type: 'memory', color: '#d97b5b', label: 'Memory Entry' },
  { type: 'project', color: '#d4c45b', label: 'Project' },
  { type: 'config', color: '#7ec87a', label: 'Config/Dir' }
];
types.forEach(t => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = `<span class="dot" style="background:${t.color}"></span>${t.label}`;
  legend.appendChild(div);
});

// Init graph FIRST (before toggle setup which calls updateVisibility)
const Graph = ForceGraph(document.getElementById('graph'))(data);

// Toggles
const toggles = document.getElementById('toggles');
const toggleTypes = ['skill', 'category', 'memory', 'project', 'config'];
let hiddenTypes = new Set();

toggleTypes.forEach(type => {
  const btn = document.createElement('button');
  btn.className = 'toggle-btn active';
  btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
  btn.dataset.type = type;
  btn.onclick = () => {
    if (hiddenTypes.has(type)) {
      hiddenTypes.delete(type);
      btn.classList.add('active');
    } else {
      hiddenTypes.add(type);
      btn.classList.remove('active');
    }
    updateVisibility();
  };
  toggles.appendChild(btn);
});

function updateVisibility() {
  const graphData = {
    nodes: data.nodes.filter(n => !hiddenTypes.has(n.type)),
    links: data.links.filter(l => {
      const src = typeof l.source === 'object' ? l.source.id : l.source;
      const tgt = typeof l.target === 'object' ? l.target.id : l.target;
      return nodeMap.has(src) && nodeMap.has(tgt) &&
        !hiddenTypes.has(nodeMap.get(src)?.type) &&
        !hiddenTypes.has(nodeMap.get(tgt)?.type);
    })
  };
  Graph.graphData(graphData);
}

// Config
Graph.backgroundColor('#0d0d0d')
  .nodeLabel(n => `<strong>${n.label}</strong><br><span style="color:#aaa;font-size:11px">${n.desc || ''}</span>`)
  .nodeRelSize(6)
  .linkColor(l => l.color ? '#' + l.color.toString(16).padStart(6, '0') : '#555')
  .linkWidth(l => l.width || 1)
  .linkDirectionalParticles(0)
  .d3VelocityDecay(0.3)
  .cooldownTime(3000)
  .onNodeClick(node => {
    const info = document.getElementById('detail');
    const catLabel = categoryLabels[node.category] || node.category || '';
    info.innerHTML = `<strong style="font-size:15px">${node.label}</strong><br>
      <span style="color:${node.color ? '#' + node.color.toString(16).padStart(6,'0') : '#fff'}">${node.type}</span>
      ${catLabel ? ` • ${catLabel}` : ''}<br>
      <span style="color:#888;font-size:12px">${node.desc || 'No description'}</span>`;
  });

// Auto-center on load
Graph.onEngineStop(() => Graph.zoomToFit(400, 50));
</script>
</body>
