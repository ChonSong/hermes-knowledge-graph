<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Knowledge Graph</title>
<script src="https://cdn.jsdelivr.net/npm/force-graph@1.43.5/dist/force-graph.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d14;
    color: #e0e0e8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    padding: 10px 20px;
    background: #12121c;
    border-bottom: 1px solid #222236;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #8888aa;
    white-space: nowrap;
  }

  #graph-stats {
    font-size: 11px;
    color: #666680;
  }
  #graph-stats span { color: #9999bb; font-weight: 500; }

  #filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  #search-input {
    background: #161622;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 4px 10px;
    color: #aaaacc;
    font-size: 11px;
    outline: none;
    width: 160px;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: #4a4a6a; }
  #search-input::placeholder { color: #444460; }

  #search-clear {
    display: none;
    background: none;
    border: none;
    color: #555580;
    cursor: pointer;
    font-size: 13px;
    padding: 0 2px;
  }
  #search-clear.visible { display: inline; }

  .header-control {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #555570;
  }
  .header-control select,
  .header-control input[type="number"] {
    background: #161622;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    padding: 2px 6px;
    color: #aaaacc;
    font-size: 11px;
    outline: none;
    width: 70px;
  }
  .header-control select { width: auto; cursor: pointer; }
  .header-control input[type="number"] { width: 45px; }
  .header-control select:focus,
  .header-control input[type="number"]:focus { border-color: #4a4a6a; }

  .header-control input[type="range"] {
    background: transparent;
    width: 60px;
    height: 12px;
    cursor: pointer;
    accent-color: #5a5a8a;
  }
  .header-control .range-val {
    min-width: 24px;
    text-align: right;
    color: #8888aa;
    font-variant-numeric: tabular-nums;
  }

  .legend-row {
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s, color 0.15s;
  }
  .legend-row.on { opacity: 1; }
  .legend-row:hover { opacity: 0.8; }
  .legend-row .ns-label { color: #555570; transition: color 0.15s; }
  .legend-row.on .ns-label { color: #9999bb; }

  .filter-label {
    font-size: 11px;
    color: #555570;
    margin-right: 4px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid #2a2a3a;
    background: #1a1a28;
    color: #7777aa;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn .count {
    background: #2a2a3a;
    padding: 0 5px;
    border-radius: 8px;
    font-size: 10px;
    color: #555580;
  }
  .filter-btn.on {
    background: #1e1e30;
    color: #aaaacc;
    border-color: #3a3a55;
  }
  .filter-btn.on .count { background: #333355; color: #8888bb; }
  .filter-btn:hover { background: #222236; }

  #main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #graph-info {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 11px;
    color: #444460;
    pointer-events: none;
  }

  #legend {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(18,18,28,0.92);
    border: 1px solid #222236;
    border-radius: 8px;
    padding: 10px 12px;
    max-height: 300px;
    overflow-y: auto;
    min-width: 130px;
  }
  #legend h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555570;
    margin-bottom: 8px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
    font-size: 11px;
    color: #8888aa;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #tooltip {
    position: absolute;
    background: #1a1a28;
    border: 1px solid #333355;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: #9999bb;
    pointer-events: none;
    display: none;
    z-index: 100;
  }

  #empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #333355;
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
  }
  #empty-state strong { color: #444466; display: block; font-size: 14px; margin-bottom: 4px; }

  /* ── Detail panel ─────────────────────────────────────────── */
  #detail-panel {
    width: 320px;
    background: #12121c;
    border-left: 1px solid #1e1e2e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  #detail-panel.visible { transform: translateX(0); }

  #detail-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid #1e1e2e;
    flex-shrink: 0;
  }
  #detail-name {
    font-size: 16px;
    font-weight: 600;
    color: #d0d0e0;
    margin-bottom: 4px;
  }
  #detail-ns {
    font-size: 11px;
    color: #555580;
  }

  #detail-badges {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
  }
  .badge-verified   { background: #162a1e; color: #4ecb71; }
  .badge-unverified { background: #222236; color: #555570; }
  .badge-complex-high   { background: #2a1520; color: #e84a5f; }
  .badge-complex-medium { background: #221a30; color: #9b7acc; }
  .badge-complex-low    { background: #162030; color: #3498db; }

  #detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  #detail-desc {
    font-size: 12px;
    color: #8888aa;
    line-height: 1.5;
    margin-bottom: 14px;
  }

  /* Meta grid */
  #detail-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .meta-item {
    background: #161622;
    border-radius: 6px;
    padding: 8px 6px;
    text-align: center;
  }
  .meta-item .val {
    font-size: 16px;
    font-weight: 600;
    color: #c0c0d8;
  }
  .meta-item .lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #444466;
    margin-top: 2px;
  }

  /* Quality score bar */
  .quality-bar-wrap {
    margin-bottom: 14px;
  }
  .quality-bar-wrap .lbl {
    font-size: 10px;
    color: #444466;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .quality-bar-wrap .bar {
    height: 4px;
    background: #1e1e2e;
    border-radius: 2px;
    overflow: hidden;
  }
  .quality-bar-wrap .fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #3498db, #9b59b6, #e84a5f);
    transition: width 0.4s;
  }

  /* Section headers */
  .sec-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #444466;
    margin-bottom: 8px;
  }
  .copy-btn {
    background: #1e1e2e;
    border: 1px solid #2a2a3a;
    color: #666680;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: #2a2a3a; color: #9999bb; border-color: #3a3a55; }
  .copy-btn.copied { color: #4ecb71; border-color: #2a4a3a; }

  .detail-section {
    margin-bottom: 14px;
  }

  /* Qualified name */
  #detail-qualified {
    background: #161622;
    border: 1px solid #222236;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 12px;
    color: #8888cc;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 14px;
  }
  #detail-qualified .qname-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #detail-qualified .copy-icon {
    flex-shrink: 0;
    cursor: pointer;
    color: #555580;
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  #detail-qualified .copy-icon:hover { background: #2a2a3a; color: #9999bb; border-color: #3a3a55; }
  #detail-qualified .copy-icon.copied { color: #4ecb71; }

  /* Tools */
  #detail-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .tool-chip {
    background: #1a2530;
    color: #5a9ab8;
    border: 1px solid #2a3a4a;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
  }

  /* Tags */
  #detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .tag-chip {
    background: #2a1a30;
    color: #b87acc;
    border: 1px solid #3a2a4a;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
  }

  /* Role/author/version */
  .meta-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }
  .meta-card {
    background: #161622;
    border-radius: 6px;
    padding: 8px 10px;
  }
  .meta-card .card-lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #444466;
    margin-bottom: 3px;
  }
  .meta-card .card-val {
    font-size: 11px;
    color: #8888aa;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Connections */
  #conn-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .conn-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .conn-item:hover { background: #1a1a28; }
  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .conn-name { font-size: 11px; color: #8888aa; flex: 1; }
  .conn-type {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .conn-type.member-of { background: #1a1a30; color: #6666aa; }
  .conn-type.workflow-peer { background: #1a2a1a; color: #5a8a5a; }
  .conn-type.quality-hub { background: #2a1a2a; color: #8a5aaa; }
  .conn-type.tool-use { background: #1a2a2a; color: #4a8a8a; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>Skills Graph</h1>
  <div id="graph-stats">—</div>
  <div class="header-control"><span>Size:</span>
    <select id="size-by">
      <option value="quality">Quality</option>
      <option value="steps">Steps</option>
      <option value="examples">Examples</option>
      <option value="lines">Lines</option>
      <option value="size" selected>Size</option>
    </select>
  </div>
  <div class="header-control"><span>Tag:</span>
    <input type="number" id="tag-threshold" min="1" max="10" value="2">
  </div>
  <div class="header-control"><span>Spread:</span>
    <input type="range" id="charge-strength" min="10" max="300" value="80">
    <span class="range-val" id="charge-val">80</span>
  </div>
  <div class="header-control"><span>Link:</span>
    <input type="range" id="link-distance" min="5" max="150" value="30">
    <span class="range-val" id="link-val">30</span>
  </div>
  <div class="header-control"><span>MinQ:</span>
    <input type="range" id="min-quality" min="0" max="10" value="0" step="0.5">
    <span class="range-val" id="minq-val">0.0</span>
  </div>
  <div id="filter-bar">
    <span class="filter-label">Edges:</span>
    <input type="text" id="search-input" placeholder="Search skills…" autocomplete="off">
    <button id="search-clear" title="Clear search">✕</button>
  </div>
</header>

<div id="main-layout">
  <div id="graph-container">
    <div id="graph-info"></div>
    <div id="legend">
      <h4>Namespaces</h4>
      <div id="legend-item"></div>
      <hr style="border:none;border-top:1px solid #1e1e2e;margin:8px 0">
      <h4 style="margin-bottom:6px">Edge Types</h4>
      <div id="legend-edges"></div>
    </div>
    <div id="tooltip"></div>
    <div id="empty-state">
      <strong>Skills Knowledge Graph</strong>
      Click a node to inspect details<br>
      Drag to pan · Scroll to zoom
    </div>
  </div>
  <div id="detail-panel">
    <div id="detail-header">
      <div id="detail-name">—</div>
      <div id="detail-ns">—</div>
      <div id="detail-badges"></div>
    </div>
    <div id="detail-body">
      <div id="detail-qualified">
        <span class="qname-text" id="detail-qname">—</span>
        <span class="copy-icon" id="copy-qname" title="Copy qualified name">⎘</span>
      </div>
      <div id="detail-desc"></div>

      <div class="quality-bar-wrap">
        <div class="lbl">
          <span>Quality Score</span>
          <span id="quality-val">—</span>
        </div>
        <div class="bar"><div class="fill" id="quality-fill"></div></div>
      </div>

      <div id="detail-meta"></div>

      <div class="meta-row">
        <div class="meta-card">
          <div class="card-lbl">Author</div>
          <div class="card-val" id="detail-author">—</div>
        </div>
        <div class="meta-card">
          <div class="card-lbl">Version</div>
          <div class="card-val" id="detail-version">—</div>
        </div>
      </div>

      <div class="detail-section" id="detail-tools-section" style="display:none">
        <div class="sec-header">
          <span>Tools Used</span>
        </div>
        <div id="detail-tools"></div>
      </div>

      <div class="detail-section" id="detail-tags-section" style="display:none">
        <div class="sec-header">
          <span>Tags</span>
        </div>
        <div id="detail-tags"></div>
      </div>

      <div class="detail-section">
        <div class="sec-header">
          <span>Connections</span>
          <span id="conn-count" style="color:#444466;font-size:9px"></span>
        </div>
        <div id="conn-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────
// DATA (inline from graph_data.json)
// ─────────────────────────────────────────────────────────────────────────
const GRAPH_DATA = null;
const _main = async () => {
  const r = await fetch('graph_data.json');
  const GRAPH_DATA = await r.json();
  const { nodes, edges, ns_colors, edge_types, edge_filter_default, namespace_order } = GRAPH_DATA;


// ─── Filter state ──────────────────────────────────────────────────────
const activeTypes = new Set(Object.keys(edge_filter_default).filter(k => edge_filter_default[k]));
const TAG_SHARED = 'tag-shared'; // must be before any code that references it
// member-of is too dense — disable by default
edge_filter_default['member-of'] = false;
activeTypes.delete('member-of');

// ─── Namespace filter & legend ──────────────────────────────────────────
let activeNamespaces = new Set(namespace_order.filter(ns => ns_colors[ns]));

const legendItem = document.getElementById('legend-item');
namespace_order.forEach(ns => {
  const c = ns_colors[ns];
  if (!c) return;
  const row = document.createElement('div');
  row.className = 'legend-row on';
  row.innerHTML = `<div class="dot" style="background:#${c.toString(16).padStart(6,'0')}"></div><span class="ns-label">${ns}</span>`;
  row.addEventListener('click', () => {
    if (activeNamespaces.has(ns)) {
      if (activeNamespaces.size <= 1) return; // keep at least one
      activeNamespaces.delete(ns);
      row.classList.remove('on');
    } else {
      activeNamespaces.add(ns);
      row.classList.add('on');
    }
    rebuildGraph();
  });
  legendItem.appendChild(row);
});

// ─── Edge type color legend ──────────────────────────────────────────────
const legendEdges = document.getElementById('legend-edges');
// Build after TAG_SHARED is registered in edge_types
setTimeout(() => {
  edge_types.forEach(([type, label, color]) => {
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.style.opacity = '0.6';
    row.style.cursor = 'default';
    row.innerHTML = `<div class="dot" style="background:#${color.toString(16).padStart(6,'0')}"></div><span class="ns-label" style="font-size:10px">${label}</span>`;
    legendEdges.appendChild(row);
  });
}, 0);

// ─── Build edge filter buttons ──────────────────────────────────────────
const filterBar = document.getElementById('filter-bar');
edge_types.forEach(([type, label, color]) => {
  const count = edges.filter(e => e.type === type).length;
  if (count === 0 && type !== TAG_SHARED) return;
  const btn = document.createElement('button');
  const isOn = edge_filter_default[type];
  btn.className = 'filter-btn' + (isOn ? ' on' : '');
  btn.dataset.type = type;
  const c = count > 0 ? count : tagEdges.length;
  btn.innerHTML = `<span class="dot" style="background:#${color.toString(16).padStart(6,'0')}"></span>${label}<span class="count">${c}</span>`;
  btn.addEventListener('click', () => {
    if (activeTypes.has(type)) {
      activeTypes.delete(type);
      btn.classList.remove('on');
    } else {
      activeTypes.add(type);
      btn.classList.add('on');
    }
    rebuildGraph();
  });
  filterBar.appendChild(btn);
});

// ─── Stats ──────────────────────────────────────────────────────────────
const stats = document.getElementById('graph-stats');
function updateStats() {
  const vCount = activeNamespaces.size;
  const tCount = namespace_order.filter(ns => ns_colors[ns]).length;
  const qCount = minQuality > 0 ? nodes.filter(n => n.quality >= minQuality).length : nodes.length;
  stats.innerHTML = `<span>${nodes.length}</span> nodes · <span>${edges.length + tagEdges.length}</span> edges · ${vCount}/${tCount} ns · q≥${minQuality.toFixed(1)}`;
}

// ─── Slider controls ────────────────────────────────────────────────────
document.getElementById('charge-strength').addEventListener('input', (e) => {
  chargeStrength = parseInt(e.target.value);
  document.getElementById('charge-val').textContent = chargeStrength;
  if (graph) {
    graph.d3Force('charge').strength(-chargeStrength);
    graph.d3ReheatSimulation();
  }
});
document.getElementById('link-distance').addEventListener('input', (e) => {
  linkDist = parseInt(e.target.value);
  document.getElementById('link-val').textContent = linkDist;
  if (graph) {
    graph.d3Force('link').distance(linkDist);
    graph.d3ReheatSimulation();
  }
});
document.getElementById('min-quality').addEventListener('input', (e) => {
  minQuality = parseFloat(e.target.value);
  document.getElementById('minq-val').textContent = minQuality.toFixed(1);
  rebuildGraph();
});

// ─── Tag edge system ─────────────────────────────────────────────────────
const edgeFilterDefault = GRAPH_DATA.edge_filter_default;
edgeFilterDefault[TAG_SHARED] = true;
// Also add to activeTypes since it's now default-on
activeTypes.add(TAG_SHARED);

// Add to edge_types for filter button
GRAPH_DATA.edge_types.push([TAG_SHARED, 'Shared tags', 0xF39C12, 0.5]);

// Build tag index
const tagIndex = {};
nodes.forEach(n => {
  (n.tags || []).forEach(t => {
    if (!tagIndex[t]) tagIndex[t] = [];
    tagIndex[t].push(n.id);
  });
});

let tagThreshold = 2;
let tagEdges = [];

function computeTagEdges(threshold) {
  const seen = new Set();
  const result = [];
  const groups = Object.values(tagIndex).filter(ids => ids.length >= threshold);
  
  for (const ids of groups) {
    if (result.length > 15000) break; // safety cap
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const key = ids[i] < ids[j] ? `${ids[i]}|${ids[j]}` : `${ids[j]}|${ids[i]}`;
        if (!seen.has(key)) {
          seen.add(key);
          result.push({ src: ids[i], tgt: ids[j], type: TAG_SHARED, label: `${threshold}+ tags` });
        }
      }
    }
  }
  return result;
}
tagEdges = computeTagEdges(tagThreshold);
document.getElementById('tag-threshold').addEventListener('change', (e) => {
  tagThreshold = Math.max(1, Math.min(10, parseInt(e.target.value) || 2));
  tagEdges = computeTagEdges(tagThreshold);
  // Update the tag-shared filter button count
  const tagBtn = document.querySelector('.filter-btn[data-type="tag-shared"] .count');
  if (tagBtn) tagBtn.textContent = tagEdges.length;
  rebuildGraph();
});

// ─── Size by system ──────────────────────────────────────────────────────
let sizeField = 'size';
const SIZE_RANGES = {
  quality: { min: 0, max: 10 },
  steps: { min: 0, max: 30 },
  examples: { min: 0, max: 20 },
  lines: { min: 0, max: 500 },
  size: { min: 0, max: 30 },
};

function nodeSize(n) {
  const field = sizeField;
  const r = SIZE_RANGES[field] || { min: 0, max: 10 };
  const raw = n[field] || r.min;
  const range = (r.max - r.min) || 1;
  return 3 + (Math.max(0, Math.min(1, (raw - r.min) / range))) * 22;
}

function updateSizeBy(field) {
  sizeField = field;
  if (graph) {
    graph.nodeVal(nodeSize);
    graph.d3ReheatSimulation();
  }
}
document.getElementById('size-by').addEventListener('change', (e) => {
  updateSizeBy(e.target.value);
});

let graph = null;
let graphInitialized = false;
let chargeStrength = 80;
let linkDist = 30;
let minQuality = 0;

function filteredEdges() {
  let base = edges.filter(e => activeTypes.has(e.type));
  if (activeTypes.has(TAG_SHARED)) {
    base = base.concat(tagEdges);
  }
  return base;
}

function rebuildGraph() {
  // Filter nodes by active namespaces AND min quality
  const nsSet = activeNamespaces;
  const visibleNodes = nodes.filter(n => nsSet.has(n.namespace) && n.quality >= minQuality);
  const visibleIds = new Set(visibleNodes.map(n => n.id));

  const fEdges = filteredEdges();
  // Only keep edges where BOTH endpoints are visible
  const nsFiltered = fEdges.filter(e => visibleIds.has(e.src) && visibleIds.has(e.tgt));

  const gEdges = nsFiltered.map(e => ({
    source: e.src,
    target: e.tgt,
    color: edgeColorFor(e.type),
    width: edgeWidthFor(e.type),
  }));

  if (graph) {
    graph.graphData({ nodes: visibleNodes, links: gEdges });
    graph.d3Force('charge').strength(-chargeStrength);
    graph.d3Force('link').distance(linkDist);
    graph.d3ReheatSimulation();
    return;
  }

  const container = document.getElementById('graph-container');
  graph = ForceGraph()(container)
    .graphData({ nodes: visibleNodes, links: gEdges })
    .nodeId('id')
    .nodeLabel(n => `${n.name} (${n.namespace})`)
    .nodeVal(nodeSize)
    .nodeColor(n => `#${n.color.toString(16).padStart(6,'0')}`)
    .linkColor(link => link.color || '#555')
    .linkWidth(link => link.width || 1)
    .linkDirectionalParticles(0)
    .backgroundColor('#0d0d14')
    .d3AlphaDecay(0.03)
    .d3VelocityDecay(0.3)
    .warmupTicks(200)
    .cooldownTicks(50)
    .onNodeClick(showDetail)
    .onBackgroundClick(() => hideDetail())
    .nodeCanvasObjectMode(() => 'after')
    .nodeCanvasObject((node, ctx) => {
      if (node.verified) {
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.size + 2.5, 0, 2 * Math.PI);
        ctx.strokeStyle = '#4ecb71';
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
    })
    .onEngineStop(() => {
      if (!graphInitialized && graph) {
        graphInitialized = true;
        graph.zoomToFit(400, 120);
      }
    });
  updateStats();
}

function edgeColorFor(type) {
  const f = edge_types.find(e => e[0] === type);
  return f ? `#${f[2].toString(16).padStart(6,'0')}` : '#333';
}

function edgeWidthFor(type) {
  const f = edge_types.find(e => e[0] === type);
  return f ? f[3] : 1;
}

// ─── Toggle all edges ────────────────────────────────────────────────────
document.getElementById('filter-bar').insertAdjacentHTML('beforeend', '<button id="toggle-all-btn" class="filter-btn" style="margin-left:4px;color:#555580">Toggle All</button>');
document.getElementById('toggle-all-btn').addEventListener('click', () => {
  const allOn = activeTypes.size < edge_types.length;
  edge_types.forEach(([type]) => {
    if (allOn) activeTypes.add(type); else activeTypes.delete(type);
  });
  document.querySelectorAll('.filter-btn[data-type]').forEach(btn => {
    btn.classList.toggle('on', activeTypes.has(btn.dataset.type));
  });
  rebuildGraph();
});

// ─── Detail panel ───────────────────────────────────────────────────────
const panel = document.getElementById('detail-panel');
const emptyState = document.getElementById('empty-state');

function showDetail(node) {
  emptyState.style.display = 'none';
  panel.classList.add('visible');

  document.getElementById('detail-name').textContent = node.name;
  document.getElementById('detail-ns').textContent = node.namespace + ' / ' + node.role;

  // Qualified name + copy button
  document.getElementById('detail-qname').textContent = node.qualified_name;
  const copyIcon = document.getElementById('copy-qname');
  copyIcon.textContent = '⎘';
  copyIcon.classList.remove('copied');
  copyIcon.onclick = () => {
    navigator.clipboard.writeText(node.qualified_name).then(() => {
      copyIcon.textContent = '✓';
      copyIcon.classList.add('copied');
      setTimeout(() => {
        copyIcon.textContent = '⎘';
        copyIcon.classList.remove('copied');
      }, 1500);
    });
  };

  // Badges
  const badges = document.getElementById('detail-badges');
  badges.innerHTML = '';
  const badgeVer = document.createElement('span');
  badgeVer.className = 'badge ' + (node.verified ? 'badge-verified' : 'badge-unverified');
  badgeVer.textContent = node.verified ? '✓ verified' : 'unverified';
  badges.appendChild(badgeVer);

  const badgeCpx = document.createElement('span');
  badgeCpx.className = 'badge badge-complex-' + node.complexity;
  badgeCpx.textContent = node.complexity + ' complexity';
  badges.appendChild(badgeCpx);

  // Quality bar
  const qPct = Math.min(100, (node.quality / 10) * 100);
  document.getElementById('quality-val').textContent = node.quality.toFixed(1);
  document.getElementById('quality-fill').style.width = qPct + '%';

  // Meta grid
  const meta = document.getElementById('detail-meta');
  meta.innerHTML = '';
  [{ val: node.steps, lbl: 'Steps' }, { val: node.examples, lbl: 'Examples' }, { val: node.pitfalls, lbl: 'Pitfalls' }, { val: node.lines, lbl: 'Lines' }].forEach(m => {
    const item = document.createElement('div');
    item.className = 'meta-item';
    item.innerHTML = `<div class="val">${m.val}</div><div class="lbl">${m.lbl}</div>`;
    meta.appendChild(item);
  });

  // Author / version
  document.getElementById('detail-author').textContent = node.author || '—';
  document.getElementById('detail-version').textContent = node.version || '—';

  // Tools
  const toolsSec = document.getElementById('detail-tools-section');
  const toolsDiv = document.getElementById('detail-tools');
  toolsDiv.innerHTML = '';
  if (node.tools && node.tools.length > 0) {
    toolsSec.style.display = 'flex';
    node.tools.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'tool-chip';
      chip.textContent = t;
      toolsDiv.appendChild(chip);
    });
  } else {
    toolsSec.style.display = 'none';
  }

  // Tags
  const tagsSec = document.getElementById('detail-tags-section');
  const tagsDiv = document.getElementById('detail-tags');
  tagsDiv.innerHTML = '';
  if (node.tags && node.tags.length > 0) {
    tagsSec.style.display = 'flex';
    node.tags.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.textContent = t;
      tagsDiv.appendChild(chip);
    });
  } else {
    tagsSec.style.display = 'none';
  }

  // Description
  document.getElementById('detail-desc').textContent = node.desc;

  // Connections
  const fEdges = filteredEdges();
  const connList = document.getElementById('conn-list');
  connList.innerHTML = '';
  const conns = fEdges.filter(e => e.src === node.id || e.tgt === node.id);
  document.getElementById('conn-count').textContent = conns.length + ' connections';

  conns.forEach(e => {
    const otherId = e.src === node.id ? e.tgt : e.src;
    const other = nodes.find(n => n.id === otherId);
    if (!other) return;
    const item = document.createElement('div');
    item.className = 'conn-item';
    const typeClass = e.type.replace(/\s+/g, '-').toLowerCase();
    item.innerHTML = `<div class="conn-dot" style="background:#${other.color.toString(16).padStart(6,'0')}"></div><span class="conn-name">${other.name}</span><span class="conn-type ${typeClass}">${e.label || e.type}</span>`;
    item.addEventListener('click', () => showDetail(other));
    connList.appendChild(item);
  });
}

function hideDetail() {
  panel.classList.remove('visible');
  emptyState.style.display = '';
}

// ─── Search / highlight ───────────────────────────────────────────────────
let searchQuery = '';
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

function applySearch() {
  const q = searchQuery.toLowerCase().trim();
  if (!q) {
    if (graph) graph.nodeColor(n => `#${n.color.toString(16).padStart(6,'0')}`).nodeLabel(n => `${n.name} (${n.namespace})`);
  } else {
    if (graph) {
      graph.nodeColor(n => {
        const match = n.name.toLowerCase().includes(q) || n.namespace.toLowerCase().includes(q);
        return match ? `#${n.color.toString(16).padStart(6,'0')}` : '#222236';
      });
      graph.nodeLabel(n => {
        const match = n.name.toLowerCase().includes(q) || n.namespace.toLowerCase().includes(q);
        return match ? `${n.name} (${n.namespace})` : '';
      });
    }
  }
  searchClear.classList.toggle('visible', !!q);
}

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  applySearch();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  applySearch();
  searchInput.focus();
});

// ─── Init ───────────────────────────────────────────────────────────────
rebuildGraph();
};
_main();
</script>
