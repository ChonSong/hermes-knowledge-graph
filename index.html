<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hermes Knowledge Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }
    #info {
      position: fixed; top: 20px; left: 20px; background: rgba(20,20,20,0.95);
      border: 1px solid #333; border-radius: 8px; padding: 16px; max-width: 320px;
      font-size: 13px; line-height: 1.5; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #info h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    #info .legend { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
    #info .legend-item { display: flex; align-items: center; gap: 8px; }
    #info .dot { width: 10px; height: 10px; border-radius: 50%; }
    #info .desc { color: #888; font-size: 11px; margin-top: 8px; }
    .link-type-toggle {
      position: fixed; bottom: 20px; left: 20px; background: rgba(20,20,20,0.95);
      border: 1px solid #333; border-radius: 8px; padding: 12px; z-index: 100;
      display: flex; gap: 8px; flex-wrap: wrap; max-width: 90vw;
    }
    .toggle-btn {
      background: #222; border: 1px solid #444; color: #888; padding: 6px 12px;
      border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s;
    }
    .toggle-btn:hover { border-color: #666; color: #aaa; }
    .toggle-btn.active { background: #306090; border-color: #5090c0; color: #fff; }
  </style>
</head>
<body>
  <div id="graph"></div>
  <div id="info">
    <h1>🔮 Hermes Knowledge Graph</h1>
    <div id="detail">Loading...</div>
    <div class="legend" id="legend"></div>
    <div class="desc">Scroll to zoom • drag to pan • drag nodes to rearrange</div>
  </div>
  <div class="link-type-toggle" id="toggles"></div>

  <script type="module">
    import ForceGraph from 'https://cdn.jsdelivr.net/npm/force-graph@1.43.5/dist/force-graph.mjs';

    // ── Data ──────────────────────────────────────────────────────────────────
    const COLORS = {
      skill: '#5b8fd9', memory: '#d97b5b', config: '#7ec87a',
      agent: '#c07bd4', project: '#d4c45b', session: '#5bc4c4', other: '#888'
    };

    const CATEGORY_COLORS = {
      'autonomous-ai-agents': 0x7ec87a, 'creative': 0xd4c45b, 'data-science': 0x5bc4c4,
      'devops': 0x5b8fd9, 'dogfood': 0xc07bd4, 'email': 0xd97b5b, 'gaming': 0x88d97b,
      'github': 0x7ec87a, 'mcp': 0x5b8fd9, 'media': 0xd97b5b, 'mlops': 0xc07bd4,
      'morning-briefing': 0x5bc4c4, 'note-taking': 0x88d97b, 'openclaw-imports': 0xc07bd4,
      'planning': 0x7ec87a, 'productivity': 0x5b8fd9, 'red-teaming': 0xd97b5b,
      'repo-transmute': 0x5bc4c4, 'research': 0x5b8fd9, 'smart-home': 0x88d97b,
      'social-media': 0xd97b5b, 'software-development': 0x7ec87a, 'yuanbao': 0xc07bd4,
      'agents': 0xc07bd4, 'memory': 0xd97b5b, 'config': 0x888888, 'project': 0xd4c45b
    };

    const categoryLabels = {
      'autonomous-ai-agents': '🤖 Auto AI Agents', 'creative': '🎨 Creative',
      'data-science': '📊 Data Science', 'devops': '⚙️ DevOps', 'dogfood': '🐕 Dogfood',
      'email': '📧 Email', 'gaming': '🎮 Gaming', 'github': '🐙 GitHub', 'mcp': '🔌 MCP',
      'media': '🎬 Media', 'mlops': '🧠 MLOps', 'morning-briefing': '🌅 Morning',
      'note-taking': '📝 Notes', 'openclaw-imports': '🦋 OpenClaw', 'planning': '📋 Planning',
      'productivity': '⚡ Productivity', 'red-teaming': '☠️ Red Team',
      'repo-transmute': '🔄 Repo Transmute', 'research': '🔍 Research',
      'smart-home': '🏠 Smart Home', 'social-media': '📱 Social',
      'software-development': '💻 Dev', 'yuanbao': '💬 Yuanbao'
    };

    const nodes = [];
    const links = [];
    const nodeMap = new Map();

    function makeNode(id, label, type, category, desc) {
      const n = { id, label, type, category, desc };
      nodeMap.set(id, n);
      return n;
    }

    // Skill nodes (89 skills)
    const skillCats = [
      ['autonomous-ai-agents',['claude-code','codex','hermes-agent','opencode','kanban-codex-lane','multi-provider-llm-backoff','roadmap-engine','self-improvement-engine']],
      ['agents',['main','zoul','codi','coach','researcher','planner','coder','reviewer','knowledge-manager','automator','browser-agent','journal','nginxmanagerbot','mediamaker','heartbeat','curriculum-design','ubd-docx-generator','zoul-delegation','zoul-soul','react-agent']],
      ['creative',['ascii-art','ascii-video','baoyu-article-illustrator','baoyu-comic','baoyu-infographic','claude-design','comfyui','design-md','excalidraw','humanizer','ideation','manim-video','p5js','pixel-art','popular-web-designs','pretext','sketch','songwriting-and-ai-music','touchdesigner-mcp','architecture-diagram']],
      ['data-science',['jupyter-live-kernel']],
      ['devops',['agent-os-architecture','canary-watch','casaos-webhook-emitter-impl','context-budget','cost-aware-llm-pipeline','deployment-patterns','docker-patterns','git-workflow','go','hermes-docker-sync-setup','hermes-docker-workflow','infrastructure-as-code','kanban-orchestrator','kanban-worker','multi-provider-api-calls','nanobot-to-hermes-migration','poker-training-platform','repo-catalog','repo-init','webhook-subscriptions']],
      ['dogfood',['dogfood']],
      ['email',['himalaya']],
      ['gaming',['minecraft-modpack-server','pokemon-player']],
      ['github',['codebase-inspection','github-auth','github-code-review','github-issues','github-pr-workflow','github-repo-management','repo-discovery']],
      ['mcp',['native-mcp']],
      ['media',['gif-search','heartmula','songsee','spotify','youtube-content']],
      ['mlops',['huggingface-hub','evaluating-llms-harness','weights-and-biases','llama-cpp','obliteratus','outlines','serving-llms-vllm','audiocraft-audio-generation','segment-anything-model','dspy','axolotl','fine-tuning-with-trl','unsloth']],
      ['morning-briefing',['morning-briefing']],
      ['note-taking',['obsidian']],
      ['openclaw-imports',['affine-logger','api-gateway','automation-workflows','gcalcli-calendar','gmail','hybrid-orchestrator','notion-api','sonoscli','self-improvement']],
      ['planning',['blueprint','nanobot-integration-plan','product-lens']],
      ['productivity',['airtable','automation-workflows','google-workspace','linear','maps','nano-pdf','notion','ocr-and-documents','powerpoint','teams-meeting-pipeline','teac-assignment-writing','university-essay']],
      ['red-teaming',['godmode']],
      ['repo-transmute',['repo-transmute']],
      ['research',['arxiv','blogwatcher','html-in-canvas-monitor','llm-wiki','polymarket']],
      ['smart-home',['openhue']],
      ['social-media',['xurl']],
      ['yuanbao',['yuanbao']],
      ['software-development',['architecture-decision-records','autonomous-development','benchmark','coding-standards','debugging-hermes-tui-commands','e2e-testing','hermes-agent-skill-authoring','node-inspect-debugger','plan','python-debugpy','requesting-code-review','security-review','skill-selector','skill-selector-prep','spike','structured-code-review','subagent-driven-development','svelte-development','systematic-debugging','test-driven-development','vite-patterns','writing-plans']],
    ];

    for (const [cat, names] of skillCats) {
      for (const name of names) {
        nodes.push(makeNode(name, name, 'skill', cat, categoryLabels[cat] || cat));
      }
    }

    // Core agents
    const agents = ['main','zoul','codi','coach','researcher','planner','coder','reviewer','knowledge-manager','automator','browser-agent','journal','nginxmanagerbot','mediamaker','heartbeat','curriculum-design','ubd-docx-generator','zoul-delegation','zoul-soul','react-agent'];
    for (const a of agents) {
      nodes.push(makeNode(a, a, 'agent', 'agents', 'Core agent'));
    }

    // Memory nodes
    const memNodes = [
      ['hermes-agent','Hermes Agent setup','skill: hermes-agent, config at ~/.hermes/, bootstrap via curl'],
      ['repo-transmute','Vision-driven migration','features-list repo, AST extraction, Playwright screenshots'],
      ['HWC','Hermes Web Computer','Go+Svelte5, phase engine, state dir, cron every 30m'],
      ['Essay workflow','.md→humanize→.docx→Drive','Times NR 12pt, double-space, cite Kublin/Ebrey not WSU materials'],
      ['Bootstrap','One-curl setup','GITHUB_TOKEN env var, PAT required, test before push'],
      ['Multi-agent','Zoul orchestration','delegate_task, subagent patterns, max 3 concurrent'],
      ['HWC theme','Solid #191919','ΔE<8 vs reference, screenshot via chrome-headless→GAPI'],
    ];
    for (const [id, label, desc] of memNodes) {
      nodes.push(makeNode(id, label, 'memory', 'memory', desc));
    }

    // Projects
    const projNodes = [
      ['hermes-sync','ChonSong/hermes-sync','Cron: Mon 9am'],
      ['hermes-agent','ChonSong/hermes-agent','Fork of upstream'],
      ['seans-reporepo','ChonSong/seans-reporepo','Cron: Mon 9am'],
      ['repo-transmute-v2','ChonSong/repo-transmute','Vision-driven migration v2, /opt/data/'],
    ];
    for (const [id, label, desc] of projNodes) {
      nodes.push(makeNode(id, label, 'project', 'project', desc));
    }

    // Config
    const configNodes = [
      ['~/.hermes/config.yaml','Config file','root config.yaml, NOT in config/ dir'],
      ['~/.hermes/memory/','Daily memory','YYYY-MM-DD.md files'],
      ['~/.hermes/memories/','Long-term memory','MEMORY.md (main), USER.md (profile)'],
      ['~/.hermes/skills/','Skills dir','SKILL.md files, ~89 skills'],
      ['~/.hermes/','Home dir','Hermes state directory'],
    ];
    for (const [id, label, desc] of configNodes) {
      nodes.push(makeNode(id, label, 'config', 'config', desc));
    }

    // Links: category → skill
    const catNodes = {};
    for (const n of nodes) {
      if (n.type === 'skill' && n.category) {
        if (!catNodes[n.category]) catNodes[n.category] = makeNode(n.category, categoryLabels[n.category] || n.category, 'category', n.category, 'Category');
        links.push({ source: n.category, target: n.id, color: 0x555555, width: 1 });
      }
    }
    // Agent links
    for (const a of agents) {
      links.push({ source: 'zoul', target: a, color: 0xc07bd4, width: 2 });
    }
    // Memory links
    links.push({ source: 'HWC', target: 'hermes-agent', color: 0xd97b5b, width: 1 });
    links.push({ source: 'repo-transmute-v2', target: 'repo-transmute', color: 0x5bc4c4, width: 1 });
    links.push({ source: 'Essay workflow', target: 'university-essay', color: 0xd97b5b, width: 1 });
    links.push({ source: 'Bootstrap', target: 'hermes-agent', color: 0x7ec87a, width: 1 });

    // Project links
    links.push({ source: 'seans-reporepo', target: 'repo-transmute-v2', color: 0xd4c45b, width: 1 });

    // Config links
    links.push({ source: 'hermes-agent', target: '~/.hermes/config.yaml', color: 0x888888, width: 1 });
    links.push({ source: 'hermes-agent', target: '~/.hermes/memory/', color: 0x888888, width: 1 });
    links.push({ source: 'hermes-agent', target: '~/.hermes/skills/', color: 0x888888, width: 1 });
    links.push({ source: 'HWC', target: '~/.hermes/', color: 0x888888, width: 1 });

    const data = { nodes, links };

    // ── Legend ─────────────────────────────────────────────────────────────────
    const legend = document.getElementById('legend');
    const types = [
      { type: 'skill', color: '#5b8fd9', label: 'Skill' },
      { type: 'agent', color: '#c07bd4', label: 'Agent' },
      { type: 'category', color: '#888888', label: 'Category' },
      { type: 'memory', color: '#d97b5b', label: 'Memory' },
      { type: 'project', color: '#d4c45b', label: 'Project' },
      { type: 'config', color: '#7ec87a', label: 'Config/Dir' },
    ];
    for (const t of types) {
      const div = document.createElement('div');
      div.className = 'legend-item';
      div.innerHTML = `<span class="dot" style="background:${t.color}"></span>${t.label}`;
      legend.appendChild(div);
    }

    // ── Graph ──────────────────────────────────────────────────────────────────
    const graphEl = document.getElementById('graph');

    const Graph = ForceGraph(graphEl)
      .graphData(data)
      .backgroundColor('#0d0d0d')
      .nodeLabel(n => `<strong>${n.label}</strong><br><span style="color:#aaa;font-size:11px">${n.desc || ''}</span>`)
      .nodeRelSize(6)
      .nodeColor(n => {
        if (n.type === 'category') return '#888888';
        if (n.type === 'skill') return '#' + (CATEGORY_COLORS[n.category] || 0x5b8fd9).toString(16).padStart(6,'0');
        if (n.type === 'agent') return '#c07bd4';
        if (n.type === 'memory') return '#d97b5b';
        if (n.type === 'project') return '#d4c45b';
        if (n.type === 'config') return '#7ec87a';
        return '#888';
      })
      .linkColor(() => '#555')
      .linkWidth(1)
      .linkDirectionalParticles(0)
      .d3VelocityDecay(0.3)
      .cooldownTime(3000)
      .onNodeClick(node => {
        const catColor = n => '#' + (CATEGORY_COLORS[n.category] || 0x888888).toString(16).padStart(6,'0');
        document.getElementById('detail').innerHTML =
          `<strong style="font-size:15px">${node.label}</strong><br>
          <span style="color:${catColor(node)}">${node.type}</span>
          ${categoryLabels[node.category] ? ' • ' + categoryLabels[node.category] : ''}<br>
          <span style="color:#888;font-size:12px">${node.desc || 'No description'}</span>`;
      });

    Graph.onEngineStop(() => Graph.zoomToFit(400, 50));

    // ── Toggles ────────────────────────────────────────────────────────────────
    const toggles = document.getElementById('toggles');
    const toggleTypes = ['skill', 'category', 'memory', 'project', 'config'];
    const hiddenTypes = new Set();

    for (const type of toggleTypes) {
      const btn = document.createElement('button');
      btn.className = 'toggle-btn active';
      btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
      btn.dataset.type = type;
      btn.onclick = () => {
        if (hiddenTypes.has(type)) {
          hiddenTypes.delete(type);
          btn.classList.add('active');
        } else {
          hiddenTypes.add(type);
          btn.classList.remove('active');
        }
        updateVisibility();
      };
      toggles.appendChild(btn);
    }

    function updateVisibility() {
      const visible = new Set(nodes.filter(n => !hiddenTypes.has(n.type)).map(n => n.id));
      Graph.graphData({
        nodes: nodes.filter(n => !hiddenTypes.has(n.type)),
        links: links.filter(l => {
          const src = typeof l.source === 'object' ? l.source.id : l.source;
          const tgt = typeof l.target === 'object' ? l.target.id : l.target;
          return visible.has(src) && visible.has(tgt);
        })
      });
    }
  </script>
</body>
</html>
