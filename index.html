<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Knowledge Graph</title>
<script src="https://cdn.jsdelivr.net/npm/force-graph@1.43.5/dist/force-graph.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e0e0e8;font-family:system-ui,sans-serif}#log{position:fixed;bottom:0;left:0;right:0;background:#1a1a28;padding:8px;font-family:monospace;font-size:11px;color:#aaa;max-height:120px;overflow-y:auto;z-index:999}
</style>
</head><body>
<div id="log">Starting...</div>
<script>
const log = document.getElementById('log');
function addLog(msg) { log.innerHTML += '<br>'+msg; log.scrollTop = log.scrollHeight; }

addLog('ForceGraph: ' + typeof ForceGraph);

fetch('graph_data.json')
  .then(r => { addLog('Fetch status: '+r.status+' '+r.statusText+' type:'+r.type); return r.json(); })
  .then(d => {
    addLog('Data: '+d.nodes.length+' nodes, '+d.edges.length+' edges');
    const links = d.edges.map(e=>({source:e.src,target:e.tgt}));
    addLog('Links: '+links.length);
    const container = document.getElementById('main') || document.body;
    addLog('Container: '+container.id+', dims: '+container.clientWidth+'x'+container.clientHeight);
    try {
      const g = ForceGraph()(container)
        .graphData({nodes:d.nodes,links})
        .nodeId('id').nodeVal(8)
        .nodeColor(n => '#'+n.color.toString(16).padStart(6,'0'))
        .linkColor(()=>'#2a2a3a')
        .backgroundColor('#0d0d14')
        .width(1600).height(900);
      addLog('Graph created OK');
      setTimeout(() => g.zoomToFit(400,80), 500);
    } catch(e) { addLog('Graph error: '+e.message); }
  })
  .catch(e => { addLog('Fetch error: '+e.message); });
</script>
</body></html>
