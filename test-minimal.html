<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minimal Test</title>
  <script src="vendor/force-graph.min.js"></script>
</head>
<body>
  <div id="graph" style="width:500px;height:300px;background:#111"></div>
  <script>
    const data = {
      nodes: [{id: 'a', label: 'Node A'}, {id: 'b', label: 'Node B'}],
      links: [{source: 'a', target: 'b'}]
    };
    const Graph = ForceGraph(document.getElementById('graph'))(data);
    Graph.backgroundColor('#111')
      .nodeLabel(n => n.label)
      .onEngineStop(() => console.log('Engine stopped'));
    console.log('Graph initialized successfully');
  </script>
</body>
</html>
